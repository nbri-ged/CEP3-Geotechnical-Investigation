<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBRI Borehole Map - CEP3 - Rambukkana - Galagedara Section</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1c2b2a;
    --paper:#f6f4ee;
    --line:#d8d2c2;
    --accent:#2f6f5e;
    --accent-dark:#234f42;
    --accent-2:#b3541e;
    --panel:#ffffff;
    --muted:#6b6459;
    --shadow-sm: 0 1px 2px rgba(28,43,42,0.06), 0 1px 1px rgba(28,43,42,0.04);
    --shadow-md: 0 4px 12px rgba(28,43,42,0.10), 0 1px 3px rgba(28,43,42,0.08);
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
  }
  header{
    background:linear-gradient(135deg, #1c2b2a 0%, #223835 100%);
    color:var(--paper);
    padding:15px 22px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    border-bottom:2px solid var(--accent-2);
    box-shadow:var(--shadow-md);
    position:relative;
    z-index:1100;
  }
  #sidebar-toggle{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.16);
    color:var(--paper);
    border-radius:8px;
    width:34px;
    height:34px;
    font-size:16px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
    align-self:center;
    transition:background 0.15s ease, transform 0.1s ease;
  }
  #sidebar-toggle:hover{
    background:rgba(255,255,255,0.14);
  }
  #sidebar-toggle:active{
    transform:scale(0.95);
  }
  header h1{
    font-size:18px;
    margin:0;
    letter-spacing:0.01em;
    font-weight:700;
  }
  header .sub{
    font-size:11.5px;
    color:#b9c9c0;
    font-weight:600;
    letter-spacing:0.04em;
  }
  #status-line{
    margin-left:auto;
    font-size:12px;
    color:#c9c2b2;
    display:flex;
    align-items:center;
    gap:8px;
  }
  #status-dot{
    width:8px;height:8px;border-radius:50%;
    background:#e0a840;
  }
  #status-dot.ok{background:#5fae7d;}
  #status-dot.err{background:#c0523f;}
  #refresh-btn{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    color:var(--paper);
    border-radius:6px;
    width:24px;
    height:24px;
    font-size:14px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.15s ease, transform 0.4s ease;
  }
  #refresh-btn:hover{
    background:rgba(255,255,255,0.18);
  }
  #refresh-btn.spinning{
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }

  #dashboard{
    background:#1f2e2a;
    color:var(--paper);
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:12px 22px;
    border-bottom:1px solid #33443e;
    position:relative;
    z-index:1;
  }
  .dash-stat{
    display:flex;
    flex-direction:column;
    padding:8px 16px 8px 14px;
    min-width:100px;
    background:rgba(255,255,255,0.04);
    border-left:3px solid #4a5f58;
    border-radius:6px;
    transition:background 0.15s ease;
  }
  .dash-stat:hover{
    background:rgba(255,255,255,0.07);
  }
  .dash-stat.dash-total{ border-left-color:#7a8a84; }
  .dash-stat.dash-completed-stat{ border-left-color:#4caf7d; }
  .dash-stat.dash-inprogress-stat{ border-left-color:#e0a840; }
  .dash-stat.dash-remaining-stat{ border-left-color:#8a8370; }
  .dash-stat.dash-progress{ border-left-color:#7fd9a8; }
  .dash-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:#a9b8b1;
    font-weight:600;
  }
  .dash-value{
    font-size:20px;
    font-weight:800;
    color:#fff;
    letter-spacing:-0.01em;
    margin-top:1px;
  }
  .dash-progress .dash-value{
    color:#7fd9a8;
  }
  @media (max-width: 768px){
    #dashboard{
      padding:8px 12px;
      gap:6px;
    }
    .dash-stat{
      padding:6px 10px 6px 10px;
      min-width:76px;
    }
    .dash-label{ font-size:9.5px; }
    .dash-value{ font-size:16px; }
  }

  #app{
    flex:1;
    display:flex;
    min-height:0;
    position:relative;
  }
  #sidebar{
    width:300px;
    min-width:300px;
    background:var(--panel);
    border-right:1px solid var(--line);
    box-shadow:2px 0 8px rgba(28,43,42,0.05);
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    transition:width 0.22s ease, min-width 0.22s ease, padding 0.22s ease;
  }
  #app.sidebar-collapsed-desktop #sidebar{
    width:0;
    min-width:0;
    border-right:none;
    overflow:hidden;
  }
  #sidebar-backdrop{
    display:none;
  }
  @media (max-width: 768px){
    header h1{ font-size:15px; }
    header .sub{ display:none; }
    #status-line{ font-size:11px; }
    #sidebar{
      position:fixed;
      top:0;
      left:0;
      height:100%;
      width:82vw;
      max-width:320px;
      min-width:0;
      z-index:1001;
      box-shadow:2px 0 12px rgba(0,0,0,0.3);
      transform:translateX(-100%);
      transition:transform 0.25s ease;
    }
    #app.sidebar-open-mobile #sidebar{
      transform:translateX(0);
    }
    #app.sidebar-open-mobile #sidebar-backdrop{
      display:block;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.4);
      z-index:1000;
    }
    .leaflet-control-layers-expanded{
      max-width:150px;
      font-size:11.5px !important;
    }
  }
  #sidebar .block{
    padding:16px 18px;
    border-bottom:1px solid var(--line);
  }
  #sidebar h2{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--muted);
